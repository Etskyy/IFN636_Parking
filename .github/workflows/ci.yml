name: CI-CD

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install --include=dev

      - name: Run backend tests
        working-directory: ./backend
        run: npm test

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install --include=dev

      - name: Build frontend
        working-directory: ./frontend
        run: node ./node_modules/react-scripts/bin/react-scripts.js build

  deploy:
    needs: test-and-build
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js on self-hosted runner
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install PM2 globally
        run: npm install -g pm2

      - name: Set up backend environment
        run: |
          cd backend
          echo "${{ secrets.PROD }}" > .env

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Start or restart backend with PM2
        run: |
          pm2 delete backend || true
          pm2 start "npm start" --name backend --cwd ./backend

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: node ./node_modules/react-scripts/bin/react-scripts.js build

      - name: Start or restart frontend with PM2
        run: |
          pm2 delete frontend || true
          pm2 serve ./frontend/build 3000 --name frontend --spa

      - name: Save PM2 process list
        run: pm2 save